[versions]
#jetbrains
autofittextview = "0.2.1"
desugar_jdk_libs = "2.1.5"
# higher versions of jaudiotagger not compatible with <= API 25 devices
# https://bitbucket.org/ijabz/jaudiotagger/issues/149/some-nio-classes-are-unavailable-while
jaudiotagger = "3.0.1"
kotlin = "2.3.20"
#KSP
ksp = "2.3.6"
#AndroidX
androidx-constraintlayout = "2.2.1"
androidx-swiperefreshlayout = "1.2.0"
androidx-lifecycleprocess = "2.10.0"
androidx-lifecycle-runtime-ktx = "2.10.0"
androidx-activity-compose = "1.8.2"
androidx-compose-bom = "2024.02.00"
androidx-viewpager2 = "1.1.0"
#Eventbus
eventbus = "3.3.1"
#Room
lottie = "6.7.1"
m3uParser = "1.4.0"
media = "1.7.1"
media3 = "1.10.0"
room = "2.8.4"
#Gradle
gradlePlugins-agp = "9.1.0"
#build
app-build-compileSDKVersion = "36"
app-build-targetSDK = "35"
app-build-minimumSDK = "23"
app-build-javaVersion = "VERSION_17"
app-build-kotlinJVMTarget = "17"
#Helpers
shortcut-badger = "1.1.22"
#versioning
app-version-appId = "com.simplemobiletools.musicplayer"
app-version-groupId = "com.simplemobiletools.commons"
app-version-versionCode = "110"
app-version-versionName = "1.1.0"
uiText = "1.10.6"
firebase-bom = "34.11.0"
google-services = "4.4.4"
firebase-crashlytics-gradle = "3.0.6"
kotlin-immutable-collections = "0.4.0"
kotlinxSerializationJson = "1.10.0"
androidx-biometricKtx = "1.4.0-alpha02"
androidx-exifinterface = "1.4.2"
androidx-documentfile = "1.1.0"
androidx-coreKtx = "1.18.0"
androidx-appcompat = "1.7.1"
material = "1.13.0"
patternLockView = "a90b0d4bf0"
reprint = "2cb206415d"
recyclerviewFastscroller = "5a95285b1f"
ezVcard = "0.11.3"
gson = "2.13.2"
jodaTime = "2.14.1"
glide = "5.0.5"
glideCompose = "1.0.0-beta08"
androidx-customview = "1.2.0"
androidx-customview-pooling = "1.1.0"
mmkv = "2.4.0"

[libraries]
#AndroidX
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "androidx-appcompat" }
androidx-biometric-ktx = { module = "androidx.biometric:biometric-ktx", version.ref = "androidx-biometricKtx" }
androidx-constraintlayout = { module = "androidx.constraintlayout:constraintlayout", version.ref = "androidx-constraintlayout" }
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidx-coreKtx" }
